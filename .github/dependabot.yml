version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:30'

    open-pull-requests-limit: 1

    reviewers:
      - 'praveenskg'

    labels:
      - 'dependencies'
      - 'automerge'

    commit-message:
      prefix: 'deps'
      include: 'scope'

    groups:
      all-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:30'

    open-pull-requests-limit: 1

    reviewers:
      - 'praveenskg'

    labels:
      - 'dependencies'
      - 'automerge'

    commit-message:
      prefix: 'deps'
      include: 'scope'

    groups:
      all-actions:
        patterns:
          - '*'
